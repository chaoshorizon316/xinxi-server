# 微信云托管部署配置
# 文档：https://developers.weixin.qq.com/miniprogram/dev/wxcloud/guide/container/

name: xinxi-server
version: 1.0.0

container:
  # Dockerfile 所在目录
  path: ./
  
  # 服务端口（容器内）
  port: 8080
  
  # 环境变量（敏感值在云托管控制台设置，这里不覆盖）
  env:
    - name: NODE_ENV
      value: production

  # 资源配置
  cpu: 0.25     # 核，最低 0.25
  mem: 0.5      # GB，最低 0.5
  minNum: 0     # 最小实例（0 = 无请求时缩容，省钱）
  maxNum: 3     # 最大实例

  # 日志
  logType: json
